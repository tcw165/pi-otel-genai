# Repository settings managed via Probot/Settings app.
# Install at: https://github.com/apps/settings
#
# If the Settings app is not installed, apply these rules manually:
#   GitHub → Settings → Branches → Add rule for "main"

repository:
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: true
  delete_branch_on_merge: true

branches:
  - name: main
    protection:
      required_status_checks:
        strict: true
        contexts:
          # GitHub Actions job name from cicd.yml — covers tests, typecheck, and lint
          - cicd
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        bypass_pull_request_allowances:
          users:
            - boyw165
      enforce_admins: false
      restrictions: null
